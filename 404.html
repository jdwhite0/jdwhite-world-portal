<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — JD System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }

  .stage {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .code {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(6rem, 15vw, 12rem);
    font-weight: 300;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.06);
    line-height: 1;
    user-select: none;
    position: absolute;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.75);
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fade-in 1.8s ease forwards 0.6s;
  }

  .subtext {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.72rem, 1.2vw, 0.85rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fade-in 1.8s ease forwards 1.2s;
  }

  .return {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.75rem 2rem;
    transition: color 0.4s ease, border-color 0.4s ease;
    opacity: 0;
    animation: fade-in 1.8s ease forwards 1.8s;
  }

  .return:hover {
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.25);
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .code { font-size: 7rem; }
  }
</style>
  <!-- Vercel Speed Insights -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

<canvas id="c"></canvas>
<div class="vignette"></div>

<div class="stage">
  <div class="code">404</div>
  <p class="headline">This portal does not exist.</p>
  <p class="subtext">The entry you're looking for hasn't been built yet — or never was.</p>
  <a class="return" href="/">Return to the system</a>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], raf;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.1 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // Deep space gradient
    const grad = ctx.createRadialGradient(W * 0.5, H * 0.45, 0, W * 0.5, H * 0.45, Math.max(W, H) * 0.7);
    grad.addColorStop(0, 'rgba(12,8,28,1)');
    grad.addColorStop(0.5, 'rgba(4,2,10,1)');
    grad.addColorStop(1, 'rgba(0,0,0,1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Nebula whisper
    const neb = ctx.createRadialGradient(W * 0.35, H * 0.4, 0, W * 0.35, H * 0.4, W * 0.4);
    neb.addColorStop(0, 'rgba(30,18,60,0.18)');
    neb.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = neb;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (let s of stars) {
      const pulse = Math.sin(t * s.speed * 1000 + s.phase) * 0.4 + 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${s.a * pulse * 0.7})`;
      ctx.fill();
    }

    raf = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(280); });
  resize();
  initStars(280);
  raf = requestAnimationFrame(draw);
})();
</script>

</body>
</html>
